# Hydra Audio — GPL-3.0
# XcodeGen project definition. Declarative replacement for Scripts/generate_xcodeproj.rb.
#
#   brew install xcodegen      # once
#   xcodegen generate          # writes Hydra.xcodeproj
#
# ── MIGRATION STATUS ────────────────────────────────────────────────────────
# This was translated 1:1 from the (working, validated) Ruby generator. It has
# NOT yet been built on a Mac. Validate with `xcodegen generate` + a build, and
# expect to iterate. The Ruby generator is kept as a working fallback until this
# is proven. KNOWN GAPS vs the Ruby generator (flagged inline below):
#   • Code-sign identity: the Ruby gen auto-detected a "Hydra Dev" self-signed
#     cert (stable signature for SMAppService's LWCR). YAML is static, so this
#     uses ad-hoc ("-"). Set CODE_SIGN_IDENTITY to "Hydra Dev" locally (or via an
#     .xcconfig) to restore the stable-signature behaviour for the daemon.
#   • Synchronized folder groups → XcodeGen uses glob `sources` instead.
#   • The VST3 SDK fetch is a preBuildScript on HydraVST (the Ruby gen used a
#     separate aggregate target to avoid a Copy-Headers ordering warning).

name: Hydra

options:
  bundleIdPrefix: audio.hydra
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

# Project-wide build settings (mirror common! in the Ruby generator).
settings:
  base:
    # Xcode's recommended default. The only unsandboxed script — the VST3-SDK
    # fetch — is isolated to the FetchVST3SDK aggregate target below.
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: NO
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "2.1.15"
    CURRENT_PROJECT_VERSION: "2.1.15"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_OBJC_WEAK: YES
    GENERATE_INFOPLIST_FILE: YES
    # GAP: ad-hoc signing. Set "Hydra Dev" for stable SMAppService signatures.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      ONLY_ACTIVE_ARCH: NO
      ARCHS: arm64 x86_64

# ── Bridge driver template ──────────────────────────────────────────────────
# Each Hydra Audio Bridge is its own .driver bundle: a tiny wrapper .c sets the
# overrides and #includes the shared Backplane/Driver/Hydra.c. They share the
# Info.plist (Hydra.plist), parameterized by PRODUCT_NAME / bundle id. Device UIDs
# (kDriver_Name + "_UID") differ per bundle so they don't collide.
targetTemplates:
  BridgeDriver:
    type: bundle
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: Backplane/Driver/bridges/${wrapper}
      - path: Backplane/Driver/Hydra.icns
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: CoreFoundation.framework
      - sdk: Accelerate.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.bridge.${idkey}
        PRODUCT_NAME: ${product}
        MACOSX_DEPLOYMENT_TARGET: "11.0"
        WRAPPER_EXTENSION: driver
        MACH_O_TYPE: mh_bundle
        # Each bridge has its OWN Info.plist with a unique CFPlugIn factory UUID,
        # so the 8 bundles never collide in coreaudiod's plugin registry.
        INFOPLIST_FILE: Backplane/Driver/bridges/${plist}
        GENERATE_INFOPLIST_FILE: NO
        INSTALL_PATH: /Library/Audio/Plug-Ins/HAL
        SKIP_INSTALL: YES
        ARCHS: arm64 x86_64
        ONLY_ACTIVE_ARCH: NO
        GCC_WARN_TYPECHECK_CALLS_TO_PRINTF: NO
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Backplane/Driver"

targets:

  # ── Hydra Audio Bridges (8 fixed loopback devices) ─────────────────────────
  HydraBridge2A:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_2A.c,  idkey: "2a",  product: HydraAudioBridge2A,  plist: Info_2A.plist }
  HydraBridge2B:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_2B.c,  idkey: "2b",  product: HydraAudioBridge2B,  plist: Info_2B.plist }
  HydraBridge4:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_4.c,   idkey: "4",   product: HydraAudioBridge4,   plist: Info_4.plist }
  HydraBridge8:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_8.c,   idkey: "8",   product: HydraAudioBridge8,   plist: Info_8.plist }
  HydraBridge16:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_16.c,  idkey: "16",  product: HydraAudioBridge16,  plist: Info_16.plist }
  HydraBridge32:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_32.c,  idkey: "32",  product: HydraAudioBridge32,  plist: Info_32.plist }
  HydraBridge64:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_64.c,  idkey: "64",  product: HydraAudioBridge64,  plist: Info_64.plist }
  HydraBridge128:
    templates: [BridgeDriver]
    templateAttributes: { wrapper: HydraBridge_128.c, idkey: "128", product: HydraAudioBridge128, plist: Info_128.plist }

  # ── Libraries ─────────────────────────────────────────────────────────────
  HydraCore:
    type: framework
    platform: macOS
    sources: [Sources/HydraCore]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.core
        DEFINES_MODULE: YES

  HydraRT:
    type: framework
    platform: macOS
    sources: [Sources/HydraRT]
    dependencies:
      - target: HydraCore
        embed: false
      - sdk: CoreAudio.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.rt
        DEFINES_MODULE: YES

  HydraNDIShim:
    type: framework
    platform: macOS
    sources:
      - Sources/HydraNDIShim
      - path: Sources/HydraNDIShim/include/hydra_ndi.h
        headerVisibility: public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.ndishim
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULES: YES
        MODULEMAP_FILE: Sources/HydraNDIShim/module.modulemap

  HydraModuleABI:
    type: framework
    platform: macOS
    sources:
      - Sources/HydraModuleABI
      - path: Sources/HydraModuleABI/include/hydra_module.h
        headerVisibility: public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.moduleabi
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULES: YES
        MODULEMAP_FILE: Sources/HydraModuleABI/module.modulemap

  HydraPluginHostABI:
    type: framework
    platform: macOS
    sources:
      - Sources/HydraPluginHostABI
      - path: Sources/HydraPluginHostABI/include/hydra_plugin_shm.h
        headerVisibility: public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.pluginhostabi
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULES: YES
        MODULEMAP_FILE: Sources/HydraPluginHostABI/module.modulemap

  # Control-surface bridge (HiQnet ↔ Mackie HUI) for Soundcraft Si consoles.
  # Pure Swift codecs + CoreMIDI/Network I/O; no Hydra dependency (logs via the
  # onLog hook). Consumed by HydraDaemon; codecs unit-tested in HydraSurfaceTests.
  HydraSurface:
    type: framework
    platform: macOS
    sources: [Sources/HydraSurface]
    dependencies:
      - sdk: CoreMIDI.framework
      - sdk: Network.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.surface
        DEFINES_MODULE: YES

  HydraVST:
    type: framework
    platform: macOS
    sources:
      - Sources/HydraVST
      - path: Sources/HydraVST/include/hydra_vst.h
        headerVisibility: public
    dependencies:
      - sdk: Cocoa.framework
      - sdk: CoreFoundation.framework
      - sdk: Foundation.framework
      # Fetch the VST3 SDK BEFORE compiling, but from a SEPARATE aggregate target
      # (see aggregateTargets below). Keeping the unsandboxed fetch script OUT of
      # HydraVST — which has a Copy Headers phase — avoids the "tasks in 'Copy
      # Headers' are delayed by unsandboxed script phases" warning.
      - target: FetchVST3SDK
        link: false
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.vst
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULES: YES
        MODULEMAP_FILE: Sources/HydraVST/module.modulemap
        CLANG_CXX_LANGUAGE_STANDARD: "c++2b"
        CLANG_CXX_LIBRARY: "libc++"
        GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) RELEASE=1"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Sources/HydraVST $(SRCROOT)/ThirdParty/vst3sdk"
        CLANG_WARN_DOCUMENTATION_COMMENTS: NO
        GCC_WARN_ABOUT_DEPRECATED_FUNCTIONS: NO

  # ── Audio engine (framework, runs IN-PROCESS inside Hydra.app) ─────────────
  # Formerly the standalone `hydrad` executable + LaunchAgent. Now a framework
  # linked into the app and started via DaemonRuntime.start(), so the user sees
  # ONE process. Source path stays Sources/hydrad; main.swift is an empty stub.
  HydraDaemon:
    type: framework
    platform: macOS
    sources:
      - path: Sources/hydrad
        excludes: [Info.plist, hydrad.entitlements]
    dependencies:
      - target: HydraCore
      - target: HydraRT
      - target: HydraVST
      - target: HydraNDIShim
      - target: HydraModuleABI
      - target: HydraPluginHostABI
      - target: HydraSurface
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.daemon
        PRODUCT_NAME: HydraDaemon
        DEFINES_MODULE: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

  # ── Executables ───────────────────────────────────────────────────────────
  hydra-plugin-host:
    type: application
    platform: macOS
    sources: [Sources/hydra-plugin-host]
    dependencies:
      - target: HydraVST
      - target: HydraPluginHostABI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.pluginhost
        PRODUCT_NAME: hydra-plugin-host
        INFOPLIST_KEY_LSUIElement: YES
        ENABLE_HARDENED_RUNTIME: YES
        # The host loads third-party VST3 .dylibs — needs the library-validation
        # exception under the hardened runtime, or the signed release build can't
        # open plugin editors (works in a dev build, fails from the .pkg).
        CODE_SIGN_ENTITLEMENTS: Sources/hydra-plugin-host/hydra-plugin-host.entitlements
        # App icon (Hydra waveform on dark gray) for the editor window / Dock.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

  HydraApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/HydraApp
        excludes:
          - Info.plist
          - LaunchAgents/audio.hydra.daemon.plist
      - Media.xcassets
    dependencies:
      - target: HydraCore
      # The audio engine + the frameworks it links — now loaded by THIS process,
      # so the app links and embeds them all (default embed: true).
      - target: HydraDaemon
      - target: HydraRT
      - target: HydraVST
      - target: HydraNDIShim
      - target: HydraModuleABI
      - target: HydraPluginHostABI
      - target: HydraSurface
      # Driver bundle → Contents/Resources (code-signed on copy).
      - target: HydraVirtualSoundcard
        embed: false
        copy:
          destination: resources
          codeSign: true
      # Out-of-process VST host → Contents/Library/Helpers. Still a separate
      # child process (crash isolation), spawned only when a VST is loaded.
      - target: hydra-plugin-host
        embed: false
        copy:
          destination: wrapper
          subpath: Contents/Library/Helpers
          codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.app
        PRODUCT_NAME: Hydra
        INFOPLIST_FILE: Sources/HydraApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/HydraApp/HydraApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Follow the macOS system accent (neutral brand mark) — don't pin the app
        # to the indigo AccentColor asset; Color.accentColor == the user's accent.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

  # ── Engine hub driver (hidden internal device) ─────────────────────────────
  # Compiles ONLY the hub wrapper (HydraEngineHub.c), which #includes Hydra.c and
  # marks the device hidden + renamed "Hydra Engine". Hydra.c itself and bridges/
  # are NOT compiled here (they're #included by their own wrappers).
  HydraVirtualSoundcard:
    type: bundle
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: Backplane/Driver/HydraEngineHub.c
      - path: Backplane/Driver/Hydra.icns
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: CoreFoundation.framework
      - sdk: Accelerate.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.virtualsoundcard
        PRODUCT_NAME: HydraVirtualSoundcard
        MACOSX_DEPLOYMENT_TARGET: "11.0"
        WRAPPER_EXTENSION: driver
        MACH_O_TYPE: mh_bundle
        INFOPLIST_FILE: Backplane/Driver/Hydra.plist
        GENERATE_INFOPLIST_FILE: NO
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Backplane/Driver"
        INSTALL_PATH: /Library/Audio/Plug-Ins/HAL
        SKIP_INSTALL: YES
        ARCHS: arm64 x86_64
        ONLY_ACTIVE_ARCH: NO
        GCC_WARN_TYPECHECK_CALLS_TO_PRINTF: NO

  # ── Tests ──────────────────────────────────────────────────────────────────
  HydraCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/HydraCoreTests]
    dependencies:
      - target: HydraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.core.tests
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

  HydraRTTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/HydraRTTests]
    dependencies:
      - target: HydraRT
      - target: HydraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.rt.tests
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

  HydraSurfaceTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/HydraSurfaceTests]
    dependencies:
      - target: HydraSurface
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.hydra.surface.tests
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

# ── Aggregate targets ────────────────────────────────────────────────────────
# Fetches the Steinberg VST3 SDK before HydraVST compiles. It lives on its OWN
# target (not HydraVST) so the unsandboxed fetch script doesn't trip the "Copy
# Headers delayed by unsandboxed script phases" warning. The script git-clones
# into $SRCROOT/ThirdParty — outside any sandbox — so THIS target (and only this
# one) keeps the Run Script sandbox OFF.
aggregateTargets:
  FetchVST3SDK:
    buildScripts:
      - name: Fetch VST3 SDK
        script: '"$SRCROOT/Scripts/fetch_vst3sdk.sh"'
        inputFiles: [$(SRCROOT)/Scripts/fetch_vst3sdk.sh]
        outputFiles: [$(SRCROOT)/ThirdParty/vst3sdk/pluginterfaces/base/ipluginbase.h]
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  HydraApp:
    build:
      targets:
        HydraApp: all
    run:
      config: Debug
    test:
      targets: [HydraCoreTests, HydraRTTests, HydraSurfaceTests]
  HydraDaemon:
    build:
      targets:
        HydraDaemon: all
    test:
      targets: [HydraCoreTests, HydraRTTests, HydraSurfaceTests]
  HydraCore:
    build:
      targets:
        HydraCore: all
    test:
      targets: [HydraCoreTests]
  HydraRTTests:
    build:
      targets:
        HydraRT: all
    test:
      targets: [HydraRTTests]
  HydraVirtualSoundcard.driver:
    build:
      targets:
        HydraVirtualSoundcard: all
